name: Sync external skills

on:
  schedule:
    # Avoid the start-of-hour load spike. Public repositories disable schedules
    # after 60 days without activity; run `gh workflow enable sync-external-skills.yml` to re-enable it.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-external-skills
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install --requirement skills/external/requirements.txt

      - name: Sync external skills
        run: scripts/sync-external-skills

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          base: ${{ github.event.repository.default_branch }}
          branch: sync/external-skills
          commit-message: |
            chore(external-skills): sync redistributed skills

            intent(external-skills): follow upstream gist changes through a reviewable pull request
          title: "chore(external-skills): sync redistributed skills"
          body: |
            Upstream gist の変更を `scripts/sync-external-skills` で同期します。

            この PR は定期実行または手動実行によって自動更新されます。
